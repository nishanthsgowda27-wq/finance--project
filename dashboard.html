<!DOCTYPE html>
<html>
<head>
<title>Smart Finance</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background:#eef2ff;
    margin:0;
}

.topbar {
    background:linear-gradient(90deg,#3b82f6,#7c3aed);
    color:white;
    padding:15px;
}

.container {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:15px;
    padding:15px;
}

.card {
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input,select,button {
    width:100%;
    padding:10px;
    margin:5px 0;
}

button {
    background:#3b82f6;
    color:white;
    border:none;
}

/* ✅ SMALL CLEAN VEHICLE IMAGES */
.vehicle-box {
    display:flex;
    gap:10px;
}

.vehicle-img {
    width:50%;
    height:90px;
    object-fit:cover;
    border-radius:8px;
}

canvas {
    height:260px !important;
}
</style>
</head>

<body>

<div class="topbar">🏦 Smart Finance Dashboard</div>

<div class="container">

<!-- INCOME -->
<div class="card">
<h3>Income & Job</h3>
<input id="income" placeholder="Yearly Income ₹">
<select id="job">
<option value="govt">Government</option>
<option value="business">Business</option>
<option value="farmer">Farmer</option>
</select>
<button onclick="calc()">Calculate</button>
<p id="incomeOut"></p>
</div>

<!-- TAX -->
<div class="card">
<h3>Tax</h3>
<button onclick="tax()">Calculate</button>
<p id="taxOut"></p>
</div>

<!-- LOAN -->
<div class="card">
<h3>Loan</h3>
<button onclick="loan()">Check</button>
<p id="loanOut"></p>
</div>

<!-- VEHICLE -->
<div class="card">
<h3>Vehicle Loan Suggestion</h3>
<button onclick="vehicle()">Suggest</button>
<p id="veh"></p>

<div class="vehicle-box">
<img id="carImg" class="vehicle-img">
<img id="bikeImg" class="vehicle-img">
</div>
</div>

<!-- FD -->
<div class="card">
<h3>FD Calculation</h3>
<input id="fdAmt" placeholder="Amount">
<input id="fdRate" placeholder="Interest %">
<input id="fdYears" placeholder="Years">
<button onclick="fd()">Calculate</button>
<p id="fdOut"></p>
</div>

<!-- EXPENSE -->
<div class="card">
<h3>Add Expense</h3>
<input id="date" placeholder="Day (1-30)">
<select id="cat">
<option value="food">Food</option>
<option value="travel">Travel</option>
<option value="rent">Rent</option>
<option value="shopping">Shopping</option>
</select>
<input id="amt" placeholder="Amount">
<button onclick="add()">Save</button>
</div>

<!-- GRAPH -->
<div class="card">
<h3>Graph</h3>

<select id="gcat">
<option value="overall">Overall</option>
<option value="food">Food</option>
<option value="travel">Travel</option>
<option value="rent">Rent</option>
<option value="shopping">Shopping</option>
</select>

<select id="days">
<option value="1">1 Day</option>
<option value="2">2 Days</option>
<option value="7">7 Days</option>
<option value="30">30 Days</option>
</select>

<button onclick="graph()">Show</button>

<canvas id="bar"></canvas>
<canvas id="pie"></canvas>
</div>

<!-- BUDGET -->
<div class="card">
<h3>Budget Planning</h3>
<p id="budget"></p>
</div>

<!-- CHAT -->
<div class="card">
<h3>AI Chat</h3>
<div id="chat" style="height:150px;overflow:auto;background:#f1f5f9;"></div>
<input id="msg">
<button onclick="send()">Send</button>
</div>

</div>

<script>
let monthly=0;
let data=[];

// INCOME
function calc(){
monthly=income.value/12;

incomeOut.innerText="Monthly ₹"+monthly;

budget.innerText=
"Needs ₹"+(monthly*0.5).toFixed(0)+
"\nWants ₹"+(monthly*0.3).toFixed(0)+
"\nSavings ₹"+(monthly*0.2).toFixed(0);
}

// TAX
function tax(){
let y=+income.value;
let t=y>1200000?y*0.1:y>800000?y*0.05:y>400000?y*0.03:0;

taxOut.innerText=
"Yearly ₹"+t+
"\nMonthly ₹"+(t/12).toFixed(0)+
"\nAdvice: Use 80C";
}

// LOAN
function loan(){
loanOut.innerText=
"Eligible Loan ₹"+(monthly*20)+
"\nEMI ≤ ₹"+(monthly*0.3)+
"\nBased on job: "+job.value;
}

// VEHICLE (FINAL FIX)
function vehicle(){

if(monthly<30000){

veh.innerText=
"Bike: Hero Splendor\n"+
"Price ₹80,000\n"+
"EMI ₹2000/month\n"+
"Duration 36 months\n"+
"Interest 9%\n\n"+
"Reason:\nLow income → low EMI safe option";

bikeImg.src="https://images.unsplash.com/photo-1580310614729-ccd69652491d";
carImg.style.display="none";
}

else if(monthly<60000){

veh.innerText=
"Car: Tata Punch\n"+
"Price ₹6,00,000\n"+
"EMI ₹12000/month\n"+
"Duration 60 months\n"+
"Interest 9%\n\n"+

"Bike: TVS Apache\n"+
"EMI ₹4000/month\n\n"+

"Reason:\nBalanced income → affordable EMI";

carImg.src="https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2";
bikeImg.src="https://images.unsplash.com/photo-1580310614729-ccd69652491d";

carImg.style.display="block";
bikeImg.style.display="block";
}

else{

veh.innerText=
"Car: Hyundai Creta\n"+
"Price ₹12,00,000\n"+
"EMI ₹22000/month\n"+
"Duration 60 months\n"+
"Interest 9%\n\n"+

"Bike: Royal Enfield\n"+
"EMI ₹6000/month\n\n"+

"Reason:\nHigh income → premium vehicle";

carImg.src="https://images.unsplash.com/photo-1617814065893-9c6d48d9f1e3";
bikeImg.src="https://images.unsplash.com/photo-1558981806-ec527fa84c39";

carImg.style.display="block";
bikeImg.style.display="block";
}
}

// FD
function fd(){
let a=+fdAmt.value;
let r=+fdRate.value/100;
let y=+fdYears.value;

let m=a*Math.pow(1+r,y);

fdOut.innerText=
"Invest ₹"+a+
"\nMaturity ₹"+m.toFixed(0)+
"\nProfit ₹"+(m-a).toFixed(0);
}

// ADD EXPENSE
function add(){
data.push({day:+date.value,cat:cat.value,amount:+amt.value});
alert("Saved");
}

// GRAPH
let barChart,pieChart;

function graph(){

let c=gcat.value;
let d=+days.value;

let filtered=data.slice(0,d);

let values=(c=="overall")?
filtered.map(x=>x.amount):
filtered.filter(x=>x.cat==c).map(x=>x.amount);

let total=values.reduce((a,b)=>a+b,0)||1;
let perc=values.map(v=>((v/total)*100).toFixed(1));

if(barChart) barChart.destroy();
barChart=new Chart(document.getElementById("bar"),{
type:'bar',
data:{
labels:values.map((_,i)=>"Day "+(i+1)+" ("+perc[i]+"%)"),
datasets:[{
data:values,
backgroundColor:["#3b82f6","#7c3aed","#06b6d4","#f59e0b"]
}]
}
});

if(pieChart) pieChart.destroy();
pieChart=new Chart(document.getElementById("pie"),{
type:'pie',
data:{
labels:["Food","Travel","Rent","Shopping"],
datasets:[{
data:[
filtered.reduce((a,b)=>a+(b.cat=="food"?b.amount:0),0),
filtered.reduce((a,b)=>a+(b.cat=="travel"?b.amount:0),0),
filtered.reduce((a,b)=>a+(b.cat=="rent"?b.amount:0),0),
filtered.reduce((a,b)=>a+(b.cat=="shopping"?b.amount:0),0)
]
}]
}
});
}

// CHAT
function send(){
chat.innerHTML+="<p>You: "+msg.value+"</p>";
chat.innerHTML+="<p>AI: Save 20%, reduce unnecessary expenses</p>";
msg.value="";
}
</script>

</body>
</html>
